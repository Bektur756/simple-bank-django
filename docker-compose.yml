services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: simple_bank
      POSTGRES_USER: simple_bank
      POSTGRES_PASSWORD: simple_bank
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simple_bank -d simple_bank"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
    command: sh /app/entrypoint.sh
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      POSTGRES_DB: simple_bank
      POSTGRES_USER: simple_bank
      POSTGRES_PASSWORD: simple_bank
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
